name: classroom-reservation-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: lsx35936030
          MYSQL_DATABASE: reservation_demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -plsx35936030"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Build package
        run: mvn -Dmaven.test.skip=true package
      - name: Verify artifact
        run: test -f target/reserve_demo-0.0.1-SNAPSHOT.jar
